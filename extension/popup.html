<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24; /* Antrasit arkaplan */
            color: #ffffff; /* Beyaz metin */
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .status-box {
            background-color: #2b2b36;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-title { font-size: 12px; color: #a0a0a0; text-transform: uppercase; }
        .status-value { font-size: 24px; font-weight: bold; color: #4CAF50; margin-top: 5px; }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #1e1e24;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #e0e0e0; }
        .footer { text-align: center; margin-top: 15px; font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🛡️ OneTech</h2>
    </div>
    
    <div class="status-box">
        <div class="status-title">Aktif Koruma Durumu</div>
        <div class="status-value" id="status-text">Devrede</div>
    </div>

    <button class="btn" id="dashboard-btn">Yönetim Paneline Git</button>

    <div class="footer">OneTech - Hackathon 2026 MVP Sürümü</div>

    <script src="popup.js"></script>
</body>
</html>
